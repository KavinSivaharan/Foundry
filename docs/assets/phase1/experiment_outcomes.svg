<text x="288.0" y="595.0" class="small" text-anchor="middle">gate</text>
<text x="288.0" y="615.0" class="value" text-anchor="middle">M8M</text>
<polygon points="496.0,501.0 510.0,515.0 496.0,529.0 482.0,515.0" fill="#b91c1c"/>
<text x="496.0" y="447.0" class="small" text-anchor="middle">Contrastive retention</text>
<text x="496.0" y="425.0" class="value" text-anchor="middle">M8N</text>
<rect x="692.0" y="503.0" width="24" height="24" rx="2" fill="#b45309"/>
<text x="704.0" y="577.0" class="small" text-anchor="middle">Replay retention</text>
<text x="704.0" y="595.0" class="small" text-anchor="middle">instrument</text>
<text x="704.0" y="615.0" class="value" text-anchor="middle">M9</text>
<circle cx="912.0" cy="515.0" r="12" fill="#15803d"/>
<text x="912.0" y="447.0" class="small" text-anchor="middle">GRPO generation</text>
<text x="912.0" y="465.0" class="small" text-anchor="middle">replay</text>
<text x="912.0" y="425.0" class="value" text-anchor="middle">M10I</text>
<rect x="1108.0" y="503.0" width="24" height="24" rx="2" fill="#b45309"/>
<text x="1120.0" y="577.0" class="small" text-anchor="middle">GRPO optimizer</text>
<text x="1120.0" y="595.0" class="small" text-anchor="middle">route</text>
<text x="1120.0" y="615.0" class="value" text-anchor="middle">M10J</text>
<text x="835.0" y="655.0" class="small" text-anchor="start">Passed</text>
<circle cx="810.0" cy="650.0" r="12" fill="#15803d"/>
<text x="955.0" y="655.0" class="small" text-anchor="start">Failed</text>
<polygon points="930.0,636.0 944.0,650.0 930.0,664.0 916.0,650.0" fill="#b91c1c"/>
<text x="1085.0" y="655.0" class="small" text-anchor="start">Stopped</text>
<rect x="1048.0" y="638.0" width="24" height="24" rx="2" fill="#b45309"/>
<text x="50.0" y="655.0" class="subtitle" text-anchor="start">A stopped branch was not optimized or evaluated downstream.</text>
</svg>
