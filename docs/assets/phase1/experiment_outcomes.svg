<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" data-source-sha256="00f62fb41062071009525b06bd02439bbd770a054850a425d24dc9cfe687691e">
<title id="title">Phase 1 experiment outcomes</title>
<desc id="desc">A chronological two-row timeline showing passed gates, failed gates, and stopped branches.</desc>
<style>
text { font-family: 'Segoe UI', Arial, sans-serif; fill: #172033; }
.title { font-size: 30px; font-weight: 600; }
.subtitle { font-size: 16px; fill: #586579; }
.label { font-size: 18px; font-weight: 600; }
.value { font-size: 17px; font-weight: 600; }
.small { font-size: 14px; fill: #586579; }
.axis { font-size: 14px; fill: #586579; }
.node-label { font-size: 17px; font-weight: 600; }
.node-detail { font-size: 13px; fill: #586579; }
</style>
<rect width="1200" height="700" fill="#ffffff"/>
<text x="50.0" y="52.0" class="title" text-anchor="start">Phase 1 experiment outcomes</text>
<text x="50.0" y="82.0" class="subtitle" text-anchor="start">Selected decision points from evaluator trust through GRPO closure</text>
<line x1="80.0" y1="245.0" x2="1120.0" y2="245.0" stroke="#d9e1ea" stroke-width="5"/>
<circle cx="80.0" cy="245.0" r="12" fill="#15803d"/>
<text x="80.0" y="177.0" class="small" text-anchor="middle">Evaluator trust</text>
<text x="80.0" y="195.0" class="small" text-anchor="middle">audit</text>
<text x="80.0" y="155.0" class="value" text-anchor="middle">M2.1</text>
<circle cx="253.3" cy="245.0" r="12" fill="#15803d"/>
<text x="253.3" y="307.0" class="small" text-anchor="middle">Failure taxonomy</text>
<text x="253.3" y="345.0" class="value" text-anchor="middle">M3</text>
<rect x="414.7" y="233.0" width="24" height="24" rx="2" fill="#b45309"/>
<text x="426.7" y="177.0" class="small" text-anchor="middle">Procedural realization</text>
<text x="426.7" y="155.0" class="value" text-anchor="middle">M4-5</text>
<polygon points="600.0,231.0 614.0,245.0 600.0,259.0 586.0,245.0" fill="#b91c1c"/>
<text x="600.0" y="307.0" class="small" text-anchor="middle">Template-bank capacity</text>
<text x="600.0" y="345.0" class="value" text-anchor="middle">M6-7</text>
<circle cx="773.3" cy="245.0" r="12" fill="#15803d"/>
<text x="773.3" y="177.0" class="small" text-anchor="middle">Matched 500 x</text>
<text x="773.3" y="195.0" class="small" text-anchor="middle">2 data</text>
<text x="773.3" y="155.0" class="value" text-anchor="middle">M8A</text>
<circle cx="946.7" cy="245.0" r="12" fill="#15803d"/>
<text x="946.7" y="307.0" class="small" text-anchor="middle">RTX 3080</text>
<text x="946.7" y="325.0" class="small" text-anchor="middle">QLoRA</text>
<text x="946.7" y="345.0" class="value" text-anchor="middle">M8B</text>
<polygon points="1120.0,231.0 1134.0,245.0 1120.0,259.0 1106.0,245.0" fill="#b91c1c"/>
<text x="1120.0" y="177.0" class="small" text-anchor="middle">Assistant-only retention</text>
<text x="1120.0" y="155.0" class="value" text-anchor="middle">M8E-8L</text>
<line x1="80.0" y1="515.0" x2="1120.0" y2="515.0" stroke="#d9e1ea" stroke-width="5"/>
<circle cx="80.0" cy="515.0" r="12" fill="#15803d"/>
<text x="80.0" y="447.0" class="small" text-anchor="middle">Common scale</text>
<text x="80.0" y="465.0" class="small" text-anchor="middle">0.50</text>
<text x="80.0" y="425.0" class="value" text-anchor="middle">M8M</text>
<polygon points="288.0,501.0 302.0,515.0 288.0,529.0 274.0,515.0" fill="#b91c1c"/>
