<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" data-source-sha256="00f62fb41062071009525b06bd02439bbd770a054850a425d24dc9cfe687691e">
<title id="title">Untouched-base failure taxonomy</title>
<desc id="desc">Horizontal bars showing the primary categories assigned to all 293 reviewed development failures.</desc>
<style>
