schema_version: 1

model:
  repo_id: Qwen/Qwen2.5-1.5B-Instruct
  revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306
  dtype: float16
  device: cuda

dataset:
  repo_id: ScaleAI/gsm1k
  revision: bc09569d09a614b9b530edc7f076fb214ac10493
  config_name: default
  source_split: test
  expected_examples: 1205

partition:
  seed: foundry-gsm1k-v1
  sealed_final_size: 301
  development_manifest: configs/eval/manifests/gsm1k_development.json
  sealed_final_manifest: configs/eval/manifests/gsm1k_sealed_final.json

prompt:
  system: >-
    You solve grade-school arithmetic word problems carefully. Use the information
    in the problem, show concise reasoning, and follow the required final-answer format.
  user_template: |-
    Solve this problem.

    {question}

    End with exactly one final line in this form:
    Final answer: <integer>

generation:
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 768
